# ==========================
# General Settings
# ==========================
set-option -g prefix C-a
bind-key C-a last-window

set -g base-index 1
set -g pane-base-index 1

set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm-256color:RGB"

set -s escape-time 0

# ==========================
# UI & Status Bar
# ==========================
set -g status on
set -g status-left-length 150
set -g status-right-length 150

set -g status-style 'bg=default,fg=colour7' 

set-option -g status-justify left
set -g status-interval 10

set -g status-left '#[bg=colour4,fg=colour0,bold] #S #[fg=colour4,bg=colour0,nobold]#[fg=colour3,bg=colour0,bold] GIT #[fg=colour7,nobold]#{simple_git_status} '

# Status Right
set -g status-right '#[fg=colour7]Uptime #(uptime | cut -f 4-5 -d " " | cut -f 1 -d ",") | Batt #{battery_graph} #{battery_percentage} #{battery_remain} | CPU #{cpu_percentage} | %d/%m %H:%M:%S '

# --- Tab Styling ---
set-window-option -g window-status-format '#[fg=color0,bg=color8,nobold]#[bg=colour8,fg=colour7] #I-#W #[fg=colour8,bg=default,nobold]'
set-window-option -g window-status-current-format '#[fg=colour0,bg=colour6,nobold]#[bg=colour6,fg=colour0,bold] #I-#W#F #[fg=colour6,bg=default,nobold]'

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Auto window rename
set-window-option -g automatic-rename on

set-window-option -g window-style 'bg=default'
set-window-option -g window-active-style 'bg=default'

# ==========================
# Key Bindings
# ==========================
# Vim-like pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Enable mouse support
set -g mouse on

# ==========================
# Plugins (TPM)
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'kristijanhusak/tmux-simple-git-status'
set -g @plugin 'tmux-plugins/tmux-battery'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin Settings
# set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
